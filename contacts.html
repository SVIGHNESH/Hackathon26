<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Contacts | She's Safe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <span class="brand__dot"></span>
          <div>
            <p class="brand__title">Emergency Contacts</p>
            <p class="brand__tag">Five contacts for SOS</p>
          </div>
        </div>
        <a class="ghost-btn" href="index.html">Back</a>
      </header>
      <main class="panel">
        <form class="contact-form" id="contactForm">
          <label class="field">
            <span>Emergency contact 1</span>
            <div class="field__row">
              <input
                id="contact1"
                name="contact1"
                type="tel"
                inputmode="tel"
                placeholder="e.g. 9876543210"
                autocomplete="tel"
                data-contact-input
                required
              />
              <button
                class="secondary-btn secondary-btn--mini"
                type="button"
                data-pick-contact="0"
              >
                Pick
              </button>
            </div>
          </label>
          <label class="field">
            <span>Emergency contact 2</span>
            <div class="field__row">
              <input
                id="contact2"
                name="contact2"
                type="tel"
                inputmode="tel"
                placeholder="e.g. 9876543210"
                autocomplete="tel"
                data-contact-input
                required
              />
              <button
                class="secondary-btn secondary-btn--mini"
                type="button"
                data-pick-contact="1"
              >
                Pick
              </button>
            </div>
          </label>
          <label class="field">
            <span>Emergency contact 3</span>
            <div class="field__row">
              <input
                id="contact3"
                name="contact3"
                type="tel"
                inputmode="tel"
                placeholder="e.g. 9876543210"
                autocomplete="tel"
                data-contact-input
                required
              />
              <button
                class="secondary-btn secondary-btn--mini"
                type="button"
                data-pick-contact="2"
              >
                Pick
              </button>
            </div>
          </label>
          <label class="field">
            <span>Emergency contact 4</span>
            <div class="field__row">
              <input
                id="contact4"
                name="contact4"
                type="tel"
                inputmode="tel"
                placeholder="e.g. 9876543210"
                autocomplete="tel"
                data-contact-input
                required
              />
              <button
                class="secondary-btn secondary-btn--mini"
                type="button"
                data-pick-contact="3"
              >
                Pick
              </button>
            </div>
          </label>
          <label class="field">
            <span>Emergency contact 5</span>
            <div class="field__row">
              <input
                id="contact5"
                name="contact5"
                type="tel"
                inputmode="tel"
                placeholder="e.g. 9876543210"
                autocomplete="tel"
                data-contact-input
                required
              />
              <button
                class="secondary-btn secondary-btn--mini"
                type="button"
                data-pick-contact="4"
              >
                Pick
              </button>
            </div>
          </label>
          <p class="helper">
            Default country code is +91. Enter 5 mobile numbers (10 digits each).
          </p>
          <div class="button-row">
            <button class="primary-btn" type="submit">Save Contacts</button>
          </div>
          <div class="status" id="contactStatus" aria-live="polite"></div>
        </form>
        <section class="note">
          <h2>Why this matters</h2>
          <p>
            Your SOS button opens WhatsApp for all 5 contacts with your live
            location. Use WhatsApp broadcast lists to notify them faster.
          </p>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
