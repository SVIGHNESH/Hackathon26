<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Contacts | She's Safe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
   <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <span class="brand__dot"></span>
          <div>
            <p class="brand__title">Emergency Contact</p>
            <p class="brand__tag">Primary number for SOS</p>
          </div>
        </div>
        <a class="ghost-btn" href="index.html">Back</a>
      </header>
      <main class="panel">
        <form class="contact-form" id="contactForm">
          <label class="field">
            <span>Primary contact number</span>
            <input
              id="contact1"
              name="contact1"
              type="tel"
              inputmode="tel"
              placeholder="e.g. 9876543210"
              autocomplete="tel"
              required
            />
          </label>
          <p class="helper">
            Default country code is +91. Enter a 10-digit mobile number.
          </p>
          <div class="button-row">
            <button class="primary-btn" type="submit">Save Contact</button>
            <button class="secondary-btn" type="button" id="pickContactBtn">
              Pick from phonebook
            </button>
          </div>
          <div class="status" id="contactStatus" aria-live="polite"></div>
        </form>
                <section class="note">
          <h2>Why this matters</h2>
          <p>
            Your SOS button uses this number to open WhatsApp instantly with
            your location.
          </p>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
