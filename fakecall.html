<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incoming Call | She's Safe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="call-body">
    <div class="call">
      <div class="call__status">Incoming Call...</div>
      <div class="call__avatar">
        <span>Mom</span>
      </div>
      <div class="call__name">Mom</div>
      <div class="call__controls">
        <button class="call__btn call__btn--decline" id="declineBtn" type="button">
          Decline
        </button>
        <button class="call__btn call__btn--accept" id="acceptBtn" type="button">
          Accept
        </button>
      </div>
      <a class="call__exit" href="index.html">Back to Safety</a>
    </div>
    <script src="app.js"></script>
  </body>
</html>
